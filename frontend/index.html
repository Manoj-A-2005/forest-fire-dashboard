<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Smart Forest Surveillance</title>

  <!-- Materialize CSS -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
    rel="stylesheet"
  />

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">


  <link rel="stylesheet" href="style.css">
</head>

<body class="green-theme">

  <!-- NAVBAR -->
  <nav class="green darken-3">
    <div class="nav-wrapper container">
      <a href="#" class="brand-logo">
        <i class="material-icons">park</i>
        Smart Forest Surveillance
      </a>
      <span class="right badge green lighten-2 black-text">LIVE</span>
    </div>
  </nav>

  <!-- ALERT -->
  <div id="alertBanner" class="card-panel red lighten-4 red-text text-darken-4 center">
    <i class="material-icons">warning</i>
    FIRE DETECTED! MOVE TO SAFE ZONES IMMEDIATELY
  </div>

  <div class="container section">

    <div class="row">

      <!-- LIVE VIDEO -->
      <div class="col s12 m12 l7">
        <div class="card z-depth-3">
          <div class="card-content">
            <span class="card-title">
              <i class="material-icons">videocam</i>
              Live Fire Detection
            </span>
            <img
  src="http://127.0.0.1:8000/video-feed"
  class="video-frame"
  decoding="async"
  loading="eager"
  referrerpolicy="no-referrer"
/>

          </div>
        </div>
      </div>

      <!-- MAP -->
      <div class="col s12 m12 l5">
        <div class="card z-depth-3">
          <div class="card-content">
            <span class="card-title">
              🗺️ Live Fire Heat Map
            </span>
            <div id="map"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- ZONE STATUS -->
    <div class="row">

      <div class="col s12 m6">
        <div id="zoneA" class="card green lighten-1 white-text z-depth-2">
          <div class="card-content">
            <span class="card-title">ZONE A</span>
            Confidence:
            <span id="zoneA_conf" class="confidence">0%</span>
          </div>
        </div>
      </div>

      <div class="col s12 m6">
        <div id="zoneB" class="card green lighten-4 green-text text-darken-4 z-depth-2">
          <div class="card-content">
            <span class="card-title">ZONE B</span>
            Confidence:
            <span id="zoneB_conf" class="confidence">0%</span>
          </div>
        </div>
      </div>

    </div>
  </div>
<div class="row center">
  <button
    id="telegramAlertBtn"
    class="btn-large red darken-2 waves-effect waves-light"
  >
    <i class="material-icons left">send</i>
    Send Telegram Alert
  </button>
</div>
 
  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script src="script.js"></script>
</body>
</html>
